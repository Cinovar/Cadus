services:
  register:
    image: oven/bun:1.3
    command: sh -c "cd /app && bun install && cd apps/register && bunx prisma generate && bun run dev"
    working_dir: /app/apps/register
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL_REGISTER}
      PORT: 3000
      CORS_ORIGIN: http://localhost
      NODE_ENV: development
    networks:
      - cadus

  auth:
    image: oven/bun:1.3
    command: sh -c "cd /app && bun install && cd apps/auth && bunx prisma generate && bun run dev"
    working_dir: /app/apps/auth
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DATABASE_URL: ${DATABASE_URL_AUTH}
      DATABASE_URL_POOLED: ${DATABASE_URL_AUTH}
      JWT_SECRET: ${JWT_SECRET}
      REGISTER_SERVICE_URL: http://register:3000
      PORT: 3001
      CORS_ORIGIN: http://localhost
      NODE_ENV: development
    depends_on:
      - register
    networks:
      - cadus

  historico:
    image: oven/bun:1.3
    command: sh -c "cd /app && bun install && cd apps/historico && bunx prisma generate && bun run dev"
    working_dir: /app/apps/historico
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NEON_DATABASE_URL_DEV: ${NEON_DATABASE_URL_HISTORICO}
      PORT: 3002
      CORS_ORIGIN: http://localhost
      NODE_ENV: development
    networks:
      - cadus

  frontend:
    image: oven/bun:1.3
    command: sh -c "cd /app && bun install && cd apps/frontend && bun run dev"
    working_dir: /app/apps/frontend
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    networks:
      - cadus

  nginx:
    build: ./nginx
    container_name: cadus-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - auth
      - register
      - historico
    networks:
      - cadus
    restart: always

networks:
  cadus:
    driver: bridge