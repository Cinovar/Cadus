server {
    listen 80;

    # ----- FRONTEND -----
    # Tudo que cai em /fonoaudiologia/ (e não for /api/) vai pro Vite
    location /fonoaudiologia/ {
        proxy_pass http://frontend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # WebSocket do HMR do Vite (modo dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ----- BACKENDS -----
    # A barra final no proxy_pass corta o prefixo do location.
    # Ex: /fonoaudiologia/api/auth/auth/login  ->  o container recebe /auth/login

    location /fonoaudiologia/api/auth/ {
        proxy_pass http://auth:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /fonoaudiologia/api/register/ {
        proxy_pass http://register:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /fonoaudiologia/api/historico/ {
        proxy_pass http://historico:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}